  <h2 class="text-sm font-semibold text-white/30 uppercase tracking-wider mb-5 animated-underline inline-block">Learning Roadmap</h2>
  <div class="space-y-4"><div class="glass-card rounded-2xl p-5"><div class="flex items-center gap-3 mb-2"><span class="text-xs font-mono text-white/30 w-8">01</span><h3 class="text-sm font-semibold text-white">Foundations (Weeks 1-4)</h3><span class="text-[12px] text-white/30 ml-auto">Python & Data Science</span></div><p class="text-xs text-white/50 leading-relaxed">Master Python for ML: NumPy array operations, Pandas data manipulation, Matplotlib & Seaborn visualization. Then dive into probability, statistics, and linear algebra — taught through code, not abstract theory.</p><div class="flex flex-wrap gap-1.5 mt-2"><div class="flex flex-wrap gap-1.5"><span class="tech-badge">NumPy</span><span class="tech-badge">Pandas</span><span class="tech-badge">Matplotlib</span><span class="tech-badge">SciPy</span><span class="tech-badge">Statistics</span></div></div></div><div class="glass-card rounded-2xl p-5"><div class="flex items-center gap-3 mb-2"><span class="text-xs font-mono text-white/30 w-8">02</span><h3 class="text-sm font-semibold text-white">Core Machine Learning (Weeks 5-8)</h3><span class="text-[12px] text-white/30 ml-auto">Supervised & Unsupervised</span></div><p class="text-xs text-white/50 leading-relaxed">Supervised learning: linear/logistic regression, SVM, decision trees, random forests, gradient boosting. Unsupervised learning: K-means, hierarchical clustering, DBSCAN, PCA, t-SNE. Feature engineering, cross-validation, and hyperparameter tuning.</p><div class="flex flex-wrap gap-1.5 mt-2"><div class="flex flex-wrap gap-1.5"><span class="tech-badge">scikit-learn</span><span class="tech-badge">XGBoost</span><span class="tech-badge">LightGBM</span><span class="tech-badge">Optuna</span></div></div></div><div class="glass-card rounded-2xl p-5"><div class="flex items-center gap-3 mb-2"><span class="text-xs font-mono text-white/30 w-8">03</span><h3 class="text-sm font-semibold text-white">Deep Learning & Advanced AI (Weeks 9-12)</h3><span class="text-[12px] text-white/30 ml-auto">Neural Networks</span></div><p class="text-xs text-white/50 leading-relaxed">Deep learning fundamentals: CNNs for computer vision, RNNs/LSTMs for sequences. Transformers architecture from scratch. NLP with BERT and GPT. Computer Vision with YOLO, Stable Diffusion, NeRF. Advanced topics: attention mechanisms, transfer learning, GANs.</p><div class="flex flex-wrap gap-1.5 mt-2"><div class="flex flex-wrap gap-1.5"><span class="tech-badge">TensorFlow</span><span class="tech-badge">PyTorch</span><span class="tech-badge">Hugging Face</span><span class="tech-badge">OpenCV</span><span class="tech-badge">YOLO</span></div></div></div><div class="glass-card rounded-2xl p-5"><div class="flex items-center gap-3 mb-2"><span class="text-xs font-mono text-white/30 w-8">04</span><h3 class="text-sm font-semibold text-white">Production & MLOps (Weeks 13-16)</h3><span class="text-[12px] text-white/30 ml-auto">Deployment</span></div><p class="text-xs text-white/50 leading-relaxed">Turn models into products. MLOps with MLflow for experiment tracking. Docker containerization, Kubernetes orchestration. CI/CD pipelines for ML. Model monitoring with Prometheus/Grafana. A/B testing, data versioning with DVC, feature stores.</p><div class="flex flex-wrap gap-1.5 mt-2"><div class="flex flex-wrap gap-1.5"><span class="tech-badge">Docker</span><span class="tech-badge">Kubernetes</span><span class="tech-badge">MLflow</span><span class="tech-badge">Prometheus</span><span class="tech-badge">DVC</span><span class="tech-badge">AWS SageMaker</span></div></div></div></div>
</div><div class="mb-12 animate-fade-rise-delay-8">
  <h2 class="text-sm font-semibold text-white/30 uppercase tracking-wider mb-5 animated-underline inline-block">Skills You'll Gain</h2>
  <div class="glass-card rounded-2xl p-4"><div class="flex flex-wrap gap-1.5"><span class="tech-badge">Python Programming</span><span class="tech-badge">Data Analysis</span><span class="tech-badge">Statistical Modeling</span><span class="tech-badge">Machine Learning</span><span class="tech-badge">Deep Learning</span><span class="tech-badge">Natural Language Processing</span><span class="tech-badge">Computer Vision</span><span class="tech-badge">Model Deployment</span><span class="tech-badge">MLOps</span><span class="tech-badge">Docker & Kubernetes</span><span class="tech-badge">Cloud Computing (AWS)</span><span class="tech-badge">API Development</span><span class="tech-badge">Data Engineering</span><span class="tech-badge">Experiment Design</span><span class="tech-badge">A/B Testing</span></div></div>
</div><div class="mb-12 animate-fade-rise-delay-9">
  <h2 class="text-sm font-semibold text-white/30 uppercase tracking-wider mb-5 animated-underline inline-block">Industry Use Cases</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Healthcare</h3><p class="text-xs text-white/50 leading-relaxed">Build diagnostic models from medical images, predict patient outcomes, and automate clinical report generation using NLP.</p><div class="text-[12px] text-white/30 mt-2"><span class="tech-badge">Medical Imaging</span> <span class="tech-badge">NLP</span></div></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Finance</h3><p class="text-xs text-white/50 leading-relaxed">Detect fraudulent transactions in real-time, algorithmically trade assets, and build credit risk scoring models used by banks.</p><div class="text-[12px] text-white/30 mt-2"><span class="tech-badge">Anomaly Detection</span> <span class="tech-badge">Time Series</span></div></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">E-Commerce</h3><p class="text-xs text-white/50 leading-relaxed">Power recommendation engines serving personalized products, predict customer churn, and optimize pricing strategies dynamically.</p><div class="text-[12px] text-white/30 mt-2"><span class="tech-badge">Recommendation</span> <span class="tech-badge">Clustering</span></div></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Autonomous Systems</h3><p class="text-xs text-white/50 leading-relaxed">Enable self-driving perception pipelines, drone navigation, and robotics control systems using computer vision and reinforcement learning.</p><div class="text-[12px] text-white/30 mt-2"><span class="tech-badge">Computer Vision</span> <span class="tech-badge">RL</span></div></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Natural Language</h3><p class="text-xs text-white/50 leading-relaxed">Build chatbots, sentiment analyzers, language translators, and summarization tools used by millions of users worldwide.</p><div class="text-[12px] text-white/30 mt-2"><span class="tech-badge">Transformers</span> <span class="tech-badge">BERT/GPT</span></div></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Cybersecurity</h3><p class="text-xs text-white/50 leading-relaxed">Deploy ML models that detect network intrusions, identify malware, and flag suspicious user behavior in real-time.</p><div class="text-[12px] text-white/30 mt-2"><span class="tech-badge">Anomaly Detection</span> <span class="tech-badge">Streaming</span></div></div></div>
</div><div class="mb-12 animate-fade-rise-delay-10">
  <h2 class="text-sm font-semibold text-white/30 uppercase tracking-wider mb-5 animated-underline inline-block">Common Beginner Mistakes</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Skipping Data Exploration</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Jumping straight to model building without understanding your data is the #1 mistake. Spend 60% of your time exploring and cleaning data.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Always start with EDA — distributions, missing values, correlations, outliers.</p></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Data Leakage</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Splitting data after preprocessing or using future information to predict past destroys model validity in production.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Split BEFORE any preprocessing. Never fit scalers/PCA on full dataset.</p></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Overfitting Without Realizing</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Impressive training scores with poor test performance. The model memorizes rather than learns general patterns.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Use cross-validation, regularization, and always hold out a test set you never touch.</p></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Ignoring Production Constraints</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Building a 2GB model that takes 10 seconds per inference is useless in production. Latency, memory, and throughput matter.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Design for deployment from day one. Quantize models. Optimize inference.</p></div></div>
</div><div class="mb-12 animate-fade-rise-delay-11">
  <h2 class="text-sm font-semibold text-white/30 uppercase tracking-wider mb-5 animated-underline inline-block">Professional Best Practices</h2>
  <div class="glass-card rounded-2xl p-4"><div class="space-y-2 text-xs text-white/60"><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">Version everything:</strong> Code, data, and model artifacts should all be versioned (Git + DVC).</div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">Write reproducible pipelines:</strong> One-click training from raw data to deployed model.</div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">Log everything:</strong> Hyperparameters, metrics, environment — if you didn't log it, it didn't happen.</div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">Start simple, iterate:</strong> Baseline model first. Then add complexity only when justified by metrics.</div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">Test data quality:</strong> Build data validation into your pipeline. Bad data = bad models.</div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">Monitor in production:</strong> Model performance degrades over time. Detect drift before users notice.</div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">Document decisions:</strong> Why did you choose algorithm X over Y? Future you will thank present you.</div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">Think in terms of systems:</strong> Your model is one component in a larger system. Understand the full data flow.</div></div></div>
</div><div class="mb-12 animate-fade-rise-delay-12">

  <h2 class="text-sm font-semibold text-white/30 uppercase tracking-wider mb-5 animated-underline inline-block">Career Paths</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-1">Machine Learning Engineer</h3><div class="text-xs text-emerald-400/70 mb-2">$120K – $180K</div><p class="text-xs text-white/50 leading-relaxed">Design and deploy ML systems at scale. Build training pipelines, manage model lifecycle, and optimize inference performance.</p><div class="text-[12px] text-white/30 mt-2">Top skills: MLOps, Kubernetes, distributed training</div></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-1">Data Scientist</h3><div class="text-xs text-emerald-400/70 mb-2">$110K – $160K</div><p class="text-xs text-white/50 leading-relaxed">Extract insights from data, build predictive models, design experiments, and drive data-informed business decisions.</p><div class="text-[12px] text-white/30 mt-2">Top skills: Statistics, SQL, Python, communication</div></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-1">Computer Vision Engineer</h3><div class="text-xs text-emerald-400/70 mb-2">$130K – $190K</div><p class="text-xs text-white/50 leading-relaxed">Build systems that understand images and video: object detection, segmentation, 3D reconstruction, and visual search.</p><div class="text-[12px] text-white/30 mt-2">Top skills: CNNs, YOLO, OpenCV, 3D vision</div></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-1">NLP / AI Engineer</h3><div class="text-xs text-emerald-400/70 mb-2">$125K – $175K</div><p class="text-xs text-white/50 leading-relaxed">Specialize in language models: build chatbots, search systems, summarizers, and LLM-powered applications.</p><div class="text-[12px] text-white/30 mt-2">Top skills: Transformers, BERT, GPT, RAG</div></div></div>
</div><div class="mb-12 animate-fade-rise-delay-14">
  <h2 class="text-sm font-semibold text-white/30 uppercase tracking-wider mb-5 animated-underline inline-block">Portfolio Building</h2>
  <div class="glass-card rounded-2xl p-4"><div class="space-y-2 text-xs text-white/60"><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">GitHub portfolio with 4 production-grade ML projects, complete with READMEs, architecture diagrams, and deployment instructions.</strong></div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">Live demo links for each project — deployed APIs, Streamlit dashboards, or Hugging Face Spaces.</strong></div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">Technical blog posts explaining your approach to solving each problem — demonstrates communication skills.</strong></div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">ML platform project as your flagship — the end-to-end platform is the highlight of any ML portfolio.</strong></div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">Kaggle competition results to validate your skills on real-world benchmark datasets.</strong></div><div class="flex items-start gap-2"><span class="text-white/30 shrink-0">&#8594;</span> <strong class="text-white/70">System design document for your major project — shows you can think beyond just writing code.</strong></div></div></div>
</div><div class="mb-12 animate-fade-rise-delay-15">
  <h2 class="text-sm font-semibold text-white/30 uppercase tracking-wider mb-5 animated-underline inline-block">Frequently Asked Questions</h2>
  <div class="glass-card rounded-2xl p-4"><div class="space-y-3"><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>Do I need a powerful computer for this course?</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">No. We use cloud GPU services (AWS SageMaker, Google Colab) for training. A standard laptop with 8GB+ RAM is sufficient for development and the first 4 weeks.</p></details><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>How much math is involved? I'm not strong at calculus.</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">We teach math just in time through code. You'll understand gradients by watching them in action, not by deriving equations. High school algebra is enough to start.</p></details><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>Will I be job-ready after 16 weeks?</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">Yes — if you put in the work. Our graduates have landed ML engineer roles at startups and mid-size companies. The portfolio you build is the key differentiator.</p></details><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>Is this course better than Coursera / DeepLearning.AI?</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">Different focus. We're project-first and production-oriented. While Andrew Ng's courses teach foundations, we teach you to ship and maintain ML systems in the real world.</p></details><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>Do I get a certificate?</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">Yes, upon completing all projects and passing the capstone evaluation. But certificates are table stakes — your portfolio of live projects is what gets you hired.</p></details><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>What if I fall behind or get stuck?</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">You get access to our community chat, mentor office hours, and detailed troubleshooting guides. We've helped 500+ students through tough bugs and concepts.</p></details></div></div>
</div><div class="mb-12 animate-fade-rise-delay-16">
  <h2 class="text-sm font-semibold text-white/30 uppercase tracking-wider mb-5 animated-underline inline-block">Tips to Succeed</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"><div class="glass-card rounded-2xl p-4"><h3 class="text-xs font-semibold text-white mb-1">Code Every Day</h3><p class="text-[12px] text-white/50 leading-relaxed">Even 30 minutes of daily practice beats 8 hours on weekends. Consistency builds neural pathways.</p></div><div class="glass-card rounded-2xl p-4"><h3 class="text-xs font-semibold text-white mb-1">Build in Public</h3><p class="text-[12px] text-white/50 leading-relaxed">Share your progress on social media. Document your learning. You'll attract opportunities and accountability.</p></div><div class="glass-card rounded-2xl p-4"><h3 class="text-xs font-semibold text-white mb-1">Debug Methodically</h3><p class="text-[12px] text-white/50 leading-relaxed">When something breaks, change one variable at a time. Isolate, hypothesize, test, confirm.</p></div><div class="glass-card rounded-2xl p-4"><h3 class="text-xs font-semibold text-white mb-1">Read Research Papers</h3><p class="text-[12px] text-white/50 leading-relaxed">From week 8 onward, read one paper per week. Start with Attention Is All You Need and ResNet.</p></div><div class="glass-card rounded-2xl p-4"><h3 class="text-xs font-semibold text-white mb-1">Compete on Kaggle</h3><p class="text-[12px] text-white/50 leading-relaxed">Join competitions to test your skills against real problems and see how top solutions differ.</p></div><div class="glass-card rounded-2xl p-4"><h3 class="text-xs font-semibold text-white mb-1">Teach Others</h3><p class="text-[12px] text-white/50 leading-relaxed">Explain concepts to peers or write blog posts. Teaching is the fastest path to mastery.</p></div><div class="glass-card rounded-2xl p-4"><h3 class="text-xs font-semibold text-white mb-1">Join the Community</h3><p class="text-[12px] text-white/50 leading-relaxed">Ask questions, review others' code, and pair program. ML is a team sport.</p></div><div class="glass-card rounded-2xl p-4"><h3 class="text-xs font-semibold text-white mb-1">Embrace Failure</h3><p class="text-[12px] text-white/50 leading-relaxed">Your model will underperform. Your pipeline will break. Each failure teaches you something no tutorial can.</p></div></div>
</div><div class="mb-12 animate-fade-rise-delay-17">
  <h2 class="text-sm font-semibold text-white/30 uppercase tracking-wider mb-5 animated-underline inline-block">Myths vs Facts</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"><div class="glass-card rounded-2xl p-5"><div class="text-xs text-red-400/70 mb-1"><s>Myth</s></div><p class="text-sm text-white/80 mb-2">"You need a PhD to work in AI."</p><div class="text-xs text-emerald-400/70 mb-1">Fact</div><p class="text-xs text-white/50 leading-relaxed">Most ML engineers have bachelor's degrees. Skills and portfolio matter far more than formal credentials.</p></div><div class="glass-card rounded-2xl p-5"><div class="text-xs text-red-400/70 mb-1"><s>Myth</s></div><p class="text-sm text-white/80 mb-2">"ML is all about building models."</p><div class="text-xs text-emerald-400/70 mb-1">Fact</div><p class="text-xs text-white/50 leading-relaxed">Models are 10% of production ML. The rest is data pipelines, infrastructure, monitoring, and system design.</p></div><div class="glass-card rounded-2xl p-5"><div class="text-xs text-red-400/70 mb-1"><s>Myth</s></div><p class="text-sm text-white/80 mb-2">"You need a top-tier GPU to learn ML."</p><div class="text-xs text-emerald-400/70 mb-1">Fact</div><p class="text-xs text-white/50 leading-relaxed">You can learn 90% of ML on a laptop. For the rest, cloud GPUs cost pennies per hour.</p></div><div class="glass-card rounded-2xl p-5"><div class="text-xs text-red-400/70 mb-1"><s>Myth</s></div><p class="text-sm text-white/80 mb-2">"AI will replace all developers."</p><div class="text-xs text-emerald-400/70 mb-1">Fact</div><p class="text-xs text-white/50 leading-relaxed">AI augments developers. The demand for ML engineers who can build and ship AI systems is growing, not shrinking.</p></div></div>
</div><div class="mb-12 animate-fade-rise-delay-18">

  <div class="glass-card rounded-2xl p-4"><div class="flex flex-wrap gap-1.5"><span class="tech-badge">Transformer Architecture</span><span class="tech-badge">Diffusion Models</span><span class="tech-badge">Neural Radiance Fields (NeRF)</span><span class="tech-badge">Reinforcement Learning</span><span class="tech-badge">Generative Adversarial Networks</span><span class="tech-badge">Federated Learning</span><span class="tech-badge">Model Quantization</span><span class="tech-badge">Knowledge Distillation</span><span class="tech-badge">Few-Shot Learning</span><span class="tech-badge">Retrieval-Augmented Generation (RAG)</span><span class="tech-badge">Mixture of Experts</span><span class="tech-badge">Causal Inference</span></div></div>

  <h2 class="text-sm font-semibold text-white/30 uppercase tracking-wider mb-5 animated-underline inline-block">Common Beginner Mistakes</h2>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Skipping Fundamentals</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Jumping to advanced topics before mastering basics. This creates knowledge gaps that compound over time.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Follow the curriculum sequentially. Master each module before moving forward.</p></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Theory Without Practice</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Reading and watching without building. True understanding comes from hands-on implementation.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Build something every week. Even a small project reinforces concepts better than hours of reading.</p></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Not Building a Portfolio</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Completing the course without creating shareable work. Your projects are your resume.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Treat every project as a portfolio piece. Document your process and publish your work.</p></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Isolation & Not Asking Questions</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Struggling alone when help is available. Getting stuck is normal — staying stuck is optional.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Use the community, ask questions, and pair with peers. Teaching others is the fastest way to learn.</p></div></div>

 Every student who persists through the tough parts succeeds.</p></details><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>Do I get a certificate?</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">Yes, upon completing all projects and passing the final evaluation. But certificates are table stakes — your portfolio of live projects is what gets you hired.</p></details><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>How does this compare to university courses?</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">University courses focus on theory and grades. We focus on practical skills and portfolio building. You'll finish with real projects that demonstrate your abilities to employers.</p></details></div></div>

-xs font-semibold text-white mb-1">Practice Deliberately</h3><p class="text-[12px] text-white/50 leading-relaxed">Focus on your weak areas. It's uncomfortable, but that's where the most growth happens.</p></div></div>

ng guides. Every student who persists through the tough parts succeeds.</p></details><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>Do I get a certificate?</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">Yes, upon completing all projects and passing the final evaluation. But certificates are table stakes — your portfolio of live projects is what gets you hired.</p></details><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>How does this compare to university courses?</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">University courses focus on theory and grades. We focus on practical skills and portfolio building. You'll finish with real projects that demonstrate your abilities to employers.</p></details></div></div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Skipping Fundamentals</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Jumping to advanced topics before mastering basics. This creates knowledge gaps that compound over time.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Follow the curriculum sequentially. Master each module before moving forward.</p></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Theory Without Practice</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Reading and watching without building. True understanding comes from hands-on implementation.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Build something every week. Even a small project reinforces concepts better than hours of reading.</p></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Not Building a Portfolio</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Completing the course without creating shareable work. Your projects are your resume.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Treat every project as a portfolio piece. Document your process and publish your work.</p></div><div class="glass-card rounded-2xl p-5"><h3 class="text-sm font-semibold text-white mb-2">Isolation & Not Asking Questions</h3><p class="text-xs text-white/50 leading-relaxed mb-2">Struggling alone when help is available. Getting stuck is normal — staying stuck is optional.</p><p class="text-xs text-emerald-400/70"><strong>Fix:</strong> Use the community, ask questions, and pair with peers. Teaching others is the fastest way to learn.</p></div></div>

es. Every student who persists through the tough parts succeeds.</p></details><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>Do I get a certificate?</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">Yes, upon completing all projects and passing the final evaluation. But certificates are table stakes — your portfolio of live projects is what gets you hired.</p></details><details class="group"><summary class="text-sm text-white/70 cursor-pointer list-none flex items-center justify-between py-2"><span>How does this compare to university courses?</span><span class="text-white/20 group-open:rotate-180 transition-transform">&#9660;</span></summary><p class="text-xs text-white/50 mt-1 pb-2">University courses focus on theory and grades. We focus on practical skills and portfolio building. You'll finish with real projects that demonstrate your abilities to employers.</p></details></div></div>
