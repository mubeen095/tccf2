<body>
<div id="root"></div>
<div id="error" style="position:fixed;top:0;left:0;right:0;background:red;color:white;padding:20px;z-index:9999;display:none"></div>
<script>
// Try to load the JS and catch any errors
window.addEventListener('error', function(e) {
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = 'ERROR: ' + (e.message || e.error || JSON.stringify(e));
  console.error('GLOBAL ERROR:', e);
});
window.addEventListener('unhandledrejection', function(e) {
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = 'PROMISE ERROR: ' + e.reason;
});
</script>
