<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostic</title>
</head>
<body>
<div id="root"></div>
<div id="error-box" style="display:none;position:fixed;top:0;left:0;right:0;background:#ff0000;color:white;padding:20px;font-family:monospace;font-size:14px;z-index:99999;white-space:pre-wrap;word-break:break-all;max-height:100dvh;overflow-y:auto"></div>
<script>
window.addEventListener('error', function(e) {
  var box = document.getElementById('error-box');
  if (box) { box.style.display = 'block'; box.textContent = 'ERROR: ' + (e.message || e.error || JSON.stringify(e)); }
  console.error('GLOBAL ERROR:', e);
});
window.addEventListener('unhandledrejection', function(e) {
  var box = document.getElementById('error-box');
  if (box) { box.style.display = 'block'; box.textContent = 'PROMISE ERROR: ' + e.reason; }
});
</script>
